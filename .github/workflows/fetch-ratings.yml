name: Fetch Bluechip Ratings
 
on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI
 
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit the JSON back to the repo
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Fetch ratings from Bluechip API
        run: |
          node fetch-ratings.js
 
      - name: Commit & push updated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bluechip-ratings.json
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: update Bluechip ratings $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
 
